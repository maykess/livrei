<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Livrei</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Mynerve&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Fundo -->
  <div class="background"></div>

  <!-- Textura -->
  <div class="textura"></div>

  <!-- Elementos gráficos -->
  <div class="circulo-desconstruido"></div>
  <div class="circulo-desconstruido2"></div>

  <!-- Retângulo Principal (Formulário) -->
  <div class="retangulo-principal"></div>

  
  <div class="logo"></div>

  <!-- Título -->
  <div class="titulo">BEM-VINDO (A)</div>

  <!-- Inputs -->
  <div class="input-user"></div>
  <div class="input-senha"></div>

  <!-- Ícones -->
  <div class="envelope"></div>
  <div class="vector1"></div>
  <div class="vector2"></div>
  <div class="vector3"></div>

  <!-- Labels dos Inputs -->
  <div class="label-user">Email ou Usuário</div>
  <div class="label-senha">Senha</div>

  <!-- Botão -->
  <div class="botao-enviar">Enviar</div>

  <!-- Texto auxiliar -->
  <div class="nao-tem-conta">Não tem conta? |</div>
  <div class="esqueceu-senha">Esqueceu a senha?</div>

  <!-- Estrelas/decoração -->
  <div class="starfill"></div>

</body>
</html>
